name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────
  # Build Go server binary (Linux amd64)
  # ────────────────────────────────────────────
  build-server:
    name: Build Go Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go mod download
          go build -ldflags="-s -w" -o chat-server .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-server
          path: server/chat-server

  # ────────────────────────────────────────────
  # Build Flutter APK (release + signed)
  # ────────────────────────────────────────────
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Decode keystore
        working-directory: flutter_app
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEY_STORE_BASE64" | base64 --decode > android/app/keystore/release.jks

      - name: Create key.properties
        working-directory: flutter_app
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore/release.jks
          EOF

      - name: Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: flutter_app/build/app/outputs/flutter-apk/*.apk

  # ────────────────────────────────────────────
  # Create GitHub Release with both artifacts
  # ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-server, build-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: chat-server
          path: artifacts/

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
