name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — used as APK version and Docker image tag'
        required: true
        default: 'v1.0.0'

jobs:
  # ────────────────────────────────────────────
  # Build Go server binaries (amd64 + arm64)
  # ────────────────────────────────────────────
  build-server:
    name: Build Go Server Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: server/go.mod

      - name: Build binary (linux/amd64)
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o chatwave-server-amd64 .

      - name: Build binary (linux/arm64)
        working-directory: server
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o chatwave-server-arm64 .

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatwave-server
          path: |
            server/chatwave-server-amd64
            server/chatwave-server-arm64

  # ────────────────────────────────────────────
  # Build & push multi-arch Docker image
  # Reuses pre-built binaries from build-server,
  # no Go compilation inside Docker.
  # ────────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Image
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download the two binaries built above
      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          name: chatwave-server
          path: server/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build amd64 image: rename binary → chatwave-server, then build
      - name: Build and push amd64
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: ARCH=amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chatwave-server:latest-amd64
            ${{ secrets.DOCKERHUB_USERNAME }}/chatwave-server:${{ github.event.inputs.tag }}-amd64
          # Rename the arch-specific binary to the generic name expected by Dockerfile
          # We use a pre-step below instead of build-arg for simplicity

      # Build arm64 image
      - name: Build and push arm64
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: ARCH=arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chatwave-server:latest-arm64
            ${{ secrets.DOCKERHUB_USERNAME }}/chatwave-server:${{ github.event.inputs.tag }}-arm64

      # Combine both into a single manifest so users just do: docker pull xxx/chatwave-server:latest
      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ github.event.inputs.tag }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"

          docker buildx imagetools create \
            --tag ${USER}/chatwave-server:${TAG} \
            ${USER}/chatwave-server:${TAG}-amd64 \
            ${USER}/chatwave-server:${TAG}-arm64

          docker buildx imagetools create \
            --tag ${USER}/chatwave-server:latest \
            ${USER}/chatwave-server:${TAG}-amd64 \
            ${USER}/chatwave-server:${TAG}-arm64

  # ────────────────────────────────────────────
  # Build Flutter APK (release + signed)
  # ────────────────────────────────────────────
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode keystore
        working-directory: flutter_app
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEY_STORE_BASE64" | base64 --decode > android/app/keystore/release.jks

      - name: Create key.properties
        working-directory: flutter_app
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore/release.jks
          EOF

      - name: Set version from tag
        working-directory: flutter_app
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          BUILD=$(echo "$VERSION" | tr -d '.')
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

      - name: Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs to ChatWave
        working-directory: flutter_app/build/app/outputs/flutter-apk
        run: |
          TAG="${{ github.event.inputs.tag }}"
          for f in *.apk; do
            newname=$(echo "$f" | sed "s/app-/ChatWave-${TAG}-/")
            mv "$f" "$newname"
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatwave-apks
          path: flutter_app/build/app/outputs/flutter-apk/*.apk

  # ────────────────────────────────────────────
  # Create GitHub Release
  # ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-server, build-docker, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          name: chatwave-server
          path: artifacts/

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: chatwave-apks
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ChatWave ${{ github.event.inputs.tag }}
          body: |
            ## ChatWave ${{ github.event.inputs.tag }}

            ### Docker（支持 amd64 / arm64）
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chatwave-server:${{ github.event.inputs.tag }}
            # 或直接用 latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chatwave-server:latest
            ```

            ### 直接运行二进制
            下载对应架构的文件，`chmod +x` 后运行即可。
          files: artifacts/**
          generate_release_notes: true
