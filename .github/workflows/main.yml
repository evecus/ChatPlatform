name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — also used as APK version name'
        required: true
        default: 'v1.0.0'

jobs:
  # ────────────────────────────────────────────
  # Build Go server binaries (amd64 + arm64)
  # ────────────────────────────────────────────
  build-server:
    name: Build Go Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: server/go.mod

      - name: Build binary (linux/amd64)
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o chatwave-server-amd64 .

      - name: Build binary (linux/arm64)
        working-directory: server
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o chatwave-server-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatwave-server
          path: |
            server/chatwave-server-amd64
            server/chatwave-server-arm64

  # ────────────────────────────────────────────
  # Build Flutter APK (release + signed)
  # ────────────────────────────────────────────
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode keystore
        working-directory: flutter_app
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEY_STORE_BASE64" | base64 --decode > android/app/keystore/release.jks

      - name: Create key.properties
        working-directory: flutter_app
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore/release.jks
          EOF

      - name: Set version from tag
        working-directory: flutter_app
        run: |
          TAG="${{ github.event.inputs.tag }}"
          # Strip leading 'v'
          VERSION="${TAG#v}"
          # Build number: strip dots e.g. 1.0.0 -> 100
          BUILD=$(echo "$VERSION" | tr -d '.')
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

      - name: Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs to ChatWave
        working-directory: flutter_app/build/app/outputs/flutter-apk
        run: |
          TAG="${{ github.event.inputs.tag }}"
          for f in *.apk; do
            newname=$(echo "$f" | sed "s/app-/ChatWave-${TAG}-/")
            mv "$f" "$newname"
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatwave-apks
          path: flutter_app/build/app/outputs/flutter-apk/*.apk

  # ────────────────────────────────────────────
  # Create GitHub Release
  # ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-server, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          name: chatwave-server
          path: artifacts/

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: chatwave-apks
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ChatWave ${{ github.event.inputs.tag }}
          files: artifacts/**
          generate_release_notes: true
