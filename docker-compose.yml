version: '3.9'

services:
  chatwave:
    # Replace YOUR_DOCKERHUB_USERNAME with your Docker Hub username
    image: YOUR_DOCKERHUB_USERNAME/chatwave-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - chatwave_data:/app/data
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/app/data/chat.db
      - UPLOAD_DIR=/app/data/uploads
      - MAX_FILE_SIZE_MB=10
      - HISTORY_LIMIT=50

volumes:
  chatwave_data:
