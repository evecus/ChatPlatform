name: chat_app
description: Private chat platform client

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  dio: ^5.4.3
  # WebSocket
  web_socket_channel: ^2.4.5
  # Local storage (token persistence)
  shared_preferences: ^2.2.3
  # File picker
  file_picker: ^8.0.3
  # Open files
  open_filex: ^4.3.4
  # Path utilities
  path_provider: ^2.1.3
  path: ^1.9.0
  # Date formatting
  intl: ^0.19.0
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
